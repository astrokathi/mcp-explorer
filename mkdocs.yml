site_name: MCP Explorer Documentation
site_description: Comprehensive technical and developer documentation for the MCP Explorer agentic UI system
site_author: Advanced Agentic Coding Team

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Getting Started: setup.md
  - Configuration: configuration.md
  - Technical Architecture: architecture.md
  - Component Breakdown: components.md
  - Testing & Verification: testing.md
  - Code Examples: examples.md
  - Implementation Walkthrough: walkthrough.md
  - Development History Log: session_history.md
